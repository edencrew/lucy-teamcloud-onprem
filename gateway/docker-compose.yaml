name: gw-stack

services:
  # ============================================================
  # GW Nginx (HTTP + Stream)
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: gw-nginx
    restart: unless-stopped
    networks:
      - gw_default
      - tc-transit
    ports:
      - "80:80"
      - "443:443"
      - "1883:1883"   # MQTT TCP (stream)
      - "8883:8883"   # MQTTS TCP (stream+TLS terminate)
      - "2222:2222"   # Gitea SSH (stream)
    env_file: [.env]
    volumes:
      - ./gw-data/letsencrypt:/etc/letsencrypt:ro
      - ./gw-data/nginx:/var/log/nginx

      # HTTPS 서비스(443) conf
      - ./nginx-conf/services:/etc/nginx/conf.d/services:ro

      # HTTP(80) 예외(WS 등) 화이트리스트 conf
      - ./nginx-conf/services-http:/etc/nginx/conf.d/services-http:ro

      # Stream 원본 conf(선언) 마운트
      - ./nginx-conf/stream-src:/opt/gw/stream-src:ro

    # 필요할 때만 사용 (services conf에서 host.docker.internal을 쓰는 경우)
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        rm -f /etc/nginx/conf.d/default.conf || true

        REAL_CERT="/etc/letsencrypt/live/$$CERT_NAME/fullchain.pem"
        REAL_KEY="/etc/letsencrypt/live/$$CERT_NAME/privkey.pem"

        READY="/etc/letsencrypt/.gw-certbot-ready"
        STATE="/etc/letsencrypt/.gw-cert-state"

        mkdir -p /etc/nginx/conf.d/services /etc/nginx/conf.d/services-http /etc/nginx/stream.d

        # nginx.conf를 직접 생성 (http + stream)
        cat > /etc/nginx/nginx.conf <<'EOF'
        user  nginx;
        worker_processes auto;
        error_log /var/log/nginx/error.log warn;
        pid /var/run/nginx.pid;

        events { worker_connections 1024; }

        http {
          include       /etc/nginx/mime.types;
          default_type  application/octet-stream;

          log_format main '$$remote_addr - $$remote_user [$$time_local] "$$request" '
                          '$$status $$body_bytes_sent "$$http_referer" '
                          '"$$http_user_agent" "$$http_x_forwarded_for"';

          access_log /var/log/nginx/access.log main;

          sendfile on;
          keepalive_timeout 65;

          include /etc/nginx/conf.d/*.conf;
        }

        stream {
          resolver 127.0.0.11 ipv6=off valid=10s;

          log_format stream_main '$$remote_addr [$$time_local] '
                                '$$protocol $$status '
                                '$$bytes_sent $$bytes_received $$session_time';

          access_log /var/log/nginx/stream-access.log stream_main;
          error_log  /var/log/nginx/stream-error.log;

          include /etc/nginx/stream.d/*.conf;
        }
        EOF

        # HTTP 공통 conf
        cat > /etc/nginx/conf.d/05_resolver.conf <<'EOF'
        resolver 127.0.0.11 ipv6=off valid=10s;
        EOF

        cat > /etc/nginx/conf.d/00_maps.conf <<'EOF'
        map $$http_upgrade $$connection_upgrade {
          default upgrade;
          ''      close;
        }
        EOF

        cat > /etc/nginx/conf.d/10_proxy_headers.inc <<'EOF'
        proxy_set_header Host              $$host;
        proxy_set_header X-Real-IP         $$remote_addr;
        proxy_set_header X-Forwarded-For   $$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $$scheme;
        proxy_set_header X-Forwarded-Host  $$host;
        proxy_set_header X-Forwarded-Port  $$server_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $$http_upgrade;
        proxy_set_header Connection $$connection_upgrade;
        EOF

        cat > /etc/nginx/conf.d/11_proxy_timeouts.inc <<'EOF'
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        EOF

        cat > /etc/nginx/conf.d/12_proxy_timeouts_ws.inc <<'EOF'
        proxy_connect_timeout 10s;
        proxy_send_timeout    1h;
        proxy_read_timeout    1h;
        EOF

        cat > /etc/nginx/conf.d/30_policy_http_proxy.inc <<'EOF'
        include /etc/nginx/conf.d/10_proxy_headers.inc;
        include /etc/nginx/conf.d/11_proxy_timeouts.inc;
        proxy_buffering off;
        EOF

        cat > /etc/nginx/conf.d/31_policy_http_ws_proxy.inc <<'EOF'
        include /etc/nginx/conf.d/10_proxy_headers.inc;
        include /etc/nginx/conf.d/12_proxy_timeouts_ws.inc;
        proxy_buffering off;
        EOF

        # ============================================================
        # Stream enable: conf-src -> stream.d copy
        # ============================================================
        STREAM_SRC="/opt/gw/stream-src"
        STREAM_DST="/etc/nginx/stream.d"

        rm -f "$$STREAM_DST"/*.conf "$$STREAM_DST"/*.inc 2>/dev/null || true

        if [ -d "$$STREAM_SRC/always" ]; then
          cp -f "$$STREAM_SRC/always/"*.conf "$$STREAM_DST/" 2>/dev/null || true
        fi

        if [ -f "$$REAL_CERT" ] && [ -f "$$REAL_KEY" ] && [ -f "$$READY" ]; then
          cat > "$$STREAM_DST/20_tls_stream.inc" <<EOF
        ssl_certificate     $$REAL_CERT;
        ssl_certificate_key $$REAL_KEY;
        ssl_protocols TLSv1.2 TLSv1.3;
        EOF

          if [ -d "$$STREAM_SRC/tls" ]; then
            cp -f "$$STREAM_SRC/tls/"*.conf "$$STREAM_DST/" 2>/dev/null || true
          fi
        else
          rm -f "$$STREAM_DST/20_tls_stream.inc" 2>/dev/null || true
        fi

        # ============================================================
        # HTTP/HTTPS policy: READY 기반
        # ============================================================
        PENDING_MODE="$${CERT_PENDING_HTTP:-503}"

        if [ ! -f "$$REAL_CERT" ] || [ ! -f "$$REAL_KEY" ] || [ ! -f "$$READY" ]; then
          echo "[nginx] cert not ready -> HTTPS pending"
          echo "[nginx] READY=$$READY exists? $$( [ -f "$$READY" ] && echo yes || echo no )"
          echo "[nginx] STATE=$$STATE exists? $$( [ -f "$$STATE" ] && echo yes || echo no )"

          if [ "$$PENDING_MODE" = "444" ]; then
            cat > /etc/nginx/conf.d/gw.conf <<'EOF'
        include /etc/nginx/conf.d/services-http/*.conf;

        server {
          listen 80 default_server;
          server_name _;
          return 444;
        }
        EOF
          else
            cat > /etc/nginx/conf.d/gw.conf <<'EOF'
        include /etc/nginx/conf.d/services-http/*.conf;

        server {
          listen 80 default_server;
          server_name _;
          add_header Content-Type text/plain always;
          add_header Retry-After "60" always;
          return 503 "TLS certificate is being issued (Let's Encrypt DNS-01). Please retry later.\n";
        }
        EOF
          fi
        else
          echo "[nginx] cert ready -> enabling HTTPS(443)"

          cat > /etc/nginx/conf.d/20_tls_server.inc <<EOF
        ssl_certificate     $$REAL_CERT;
        ssl_certificate_key $$REAL_KEY;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        EOF

          if [ "$${HTTP_STRICT:-false}" = "true" ]; then
            HTTP_BLOCK='return 444;'
          else
            HTTP_BLOCK='return 301 https://$$host$$request_uri;'
          fi

          cat > /etc/nginx/conf.d/gw.conf <<EOF
        include /etc/nginx/conf.d/services-http/*.conf;

        server {
          listen 80 default_server;
          server_name _;
          $${HTTP_BLOCK}
        }

        include /etc/nginx/conf.d/services/*.conf;

        server {
          listen 443 ssl default_server;
          server_name _;
          include /etc/nginx/conf.d/20_tls_server.inc;
          return 404;
        }
        EOF
        fi

        nginx -t
        exec nginx -g "daemon off;"

    healthcheck:
      test: ["CMD-SHELL", "nginx -t >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================
  # Certbot daemon
  # ============================================================
  certbot:
    image: certbot/dns-route53
    container_name: gw-certbot
    restart: unless-stopped
    networks:
      - gw_default
    env_file: [.env]
    volumes:
      - ./gw-data/letsencrypt:/etc/letsencrypt
      - ./gw-data/letsencrypt:/var/lib/letsencrypt
      - ./gw-data/letsencrypt:/var/log/letsencrypt
      - ./nginx-conf/services:/opt/gw/services:ro
      - ./nginx-conf/services-http:/opt/gw/services-http:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        set -x
        set -f
        trap 'rc=$$?; echo "[certbot] ERROR rc=$$rc line=$$LINENO" >&2; exit $$rc' ERR

        READY="/etc/letsencrypt/.gw-certbot-ready"
        STATE="/etc/letsencrypt/.gw-cert-state"
        MIN_VALID_DAYS="$${MIN_VALID_DAYS:-10}"

        echo "[certbot] boot: CERT_NAME=$$CERT_NAME"
        echo "[certbot] boot: LE_DOMAINS=$${LE_DOMAINS:-<auto>}"
        echo "[certbot] boot: MIN_VALID_DAYS=$$MIN_VALID_DAYS"
        echo "[certbot] boot: DNS_PROPAGATION_SECONDS=$${DNS_PROPAGATION_SECONDS:-60}"

        CERT="/etc/letsencrypt/live/$$CERT_NAME/fullchain.pem"
        KEY="/etc/letsencrypt/live/$$CERT_NAME/privkey.pem"

        mark_not_ready() { rm -f "$$READY" 2>/dev/null || true; }

        write_state() {
          TS="$$(date -Is)"
          {
            echo "ts=$$TS"
            echo "cert_name=$$CERT_NAME"
            echo "desired_domains=$$1"
            echo "current_domains=$$2"
            echo "expiry=$$3"
            echo "min_valid_days=$$MIN_VALID_DAYS"
          } > "$$STATE"
        }

        normalize_domains() {
          echo "$$1" \
            | tr ', ' '\n' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$$//' \
            | sed '/^$$/d' \
            | sort -u \
            | tr '\n' ' ' \
            | sed 's/[[:space:]]*$$//'
        }

        parse_domains_from_services() {
          ( \
            grep -RhoE '^[[:space:]]*server_name[[:space:]]+[^;]+' /opt/gw/services /opt/gw/services-http 2>/dev/null || true \
          ) | awk '{$$1=""; print}' \
            | tr ' ' '\n' \
            | sed 's/;//g' \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$$//' \
            | sed '/^$$/d' \
            | grep -v '^_$$' \
            | sort -u \
            | tr '\n' ' ' \
            | sed 's/[[:space:]]*$$//'
        }

        desired_domains() {
          if [ -n "$${LE_DOMAINS:-}" ]; then
            normalize_domains "$$LE_DOMAINS"; return 0
          fi
          AUTO="$$(parse_domains_from_services)"
          EXTRA="$${LE_EXTRA_DOMAINS:-}"
          normalize_domains "$$AUTO $$EXTRA"
        }

        current_domains() {
          OUT="$$(certbot certificates --cert-name "$$CERT_NAME" 2>/dev/null || true)"
          LINE="$$(echo "$$OUT" | awk -F': ' '/^[[:space:]]*(Domains|Identifiers):/ {print $$2; exit}' || true)"
          [ -n "$$LINE" ] || { echo ""; return 0; }
          normalize_domains "$$LINE"
        }

        expiry_date() {
          OUT="$$(certbot certificates --cert-name "$$CERT_NAME" 2>/dev/null || true)"
          EXP_RAW="$$(echo "$$OUT" | awk -F': ' '/Expiry Date:/ {print $$2; exit}' || true)"
          echo "$$EXP_RAW" | sed 's/ (.*$$//' || true
        }

        cert_expiring_or_invalid() {
          EXP="$$(expiry_date)"
          [ -n "$$EXP" ] || { echo "[certbot] expiry empty -> expiring"; return 0; }

          EXP_EPOCH="$$(date -d "$$EXP" +%s 2>/dev/null || echo 0)"
          NOW_EPOCH="$$(date +%s)"
          THRESH="$$(($$MIN_VALID_DAYS * 86400))"

          [ "$$EXP_EPOCH" -gt 0 ] || { echo "[certbot] expiry epoch invalid -> expiring"; return 0; }

          if [ "$$EXP_EPOCH" -le "$$(($$NOW_EPOCH + $$THRESH))" ]; then
            echo "[certbot] expiring soon/expired (exp=$$EXP)"
            return 0
          fi

          echo "[certbot] expiry ok (exp=$$EXP)"
          return 1
        }

        build_dom_args() {
          DOM_ARGS=""
          OLD_IFS="$$IFS"
          IFS=' '
          for d in $$1; do
            [ -n "$$d" ] || continue
            DOM_ARGS="$$DOM_ARGS -d $$d"
          done
          IFS="$$OLD_IFS"
          echo "$$DOM_ARGS"
        }

        detect_wait_arg() {
          HELP="$$(certbot --help all 2>/dev/null || true)"
          if echo "$$HELP" | grep -q -- '--dns-route53-propagation-seconds'; then
            echo "--dns-route53-propagation-seconds $${DNS_PROPAGATION_SECONDS:-60}"; return 0
          fi
          if echo "$$HELP" | grep -q -- '--dns-propagation-seconds'; then
            echo "--dns-propagation-seconds $${DNS_PROPAGATION_SECONDS:-60}"; return 0
          fi
          echo ""
        }

        need_reissue() {
          mark_not_ready

          if [ ! -f "$$CERT" ] || [ ! -f "$$KEY" ]; then
            echo "[certbot] no cert files -> need issuance"
            return 0
          fi

          DES="$$(desired_domains)"
          CUR="$$(current_domains)"
          EXP="$$(expiry_date)"

          echo "[certbot] desired: $$DES"
          echo "[certbot] current : $$CUR"
          echo "[certbot] expiry  : $$EXP"

          [ -n "$$CUR" ] || { echo "[certbot] current empty -> reissue"; return 0; }
          [ "$$DES" = "$$CUR" ] || { echo "[certbot] mismatch -> reissue"; return 0; }

          cert_expiring_or_invalid && { echo "[certbot] expiring -> reissue"; return 0; }

          write_state "$$DES" "$$CUR" "$$EXP"
          touch "$$READY"
          echo "[certbot] match & expiry ok -> skip"
          return 1
        }

        issue_or_replace() {
          DES="$$(desired_domains)"
          DOM_ARGS="$$(build_dom_args "$$DES")"
          WAIT_ARG="$$(detect_wait_arg)"

          echo "[certbot] issuing/replacing: cert-name=$$CERT_NAME domains='$$DES' wait_arg='$$WAIT_ARG'"

          certbot certonly --dns-route53 \
            --agree-tos --non-interactive \
            -m "$$LE_EMAIL" \
            --cert-name "$$CERT_NAME" \
            --force-renewal \
            $$WAIT_ARG \
            $$DOM_ARGS

          CUR="$$(current_domains)"
          EXP="$$(expiry_date)"
          write_state "$$DES" "$$CUR" "$$EXP"
          touch "$$READY"
        }

        echo "[certbot] ensure start"
        while true; do
          if need_reissue; then
            issue_or_replace && break
            echo "[certbot] ensure failed -> retry in $${BOOTSTRAP_RETRY:-60}s"
            sleep "$${BOOTSTRAP_RETRY:-60}"
            continue
          fi
          break
        done

        echo "[certbot] daemon sleep"
        while :; do sleep 86400; done

    healthcheck:
      test: ["CMD-SHELL", "test -f /etc/letsencrypt/.gw-certbot-ready"]
      interval: 30s
      timeout: 3s
      retries: 10

  # ============================================================
  # Renewer
  # ============================================================
  renewer:
    image: docker:27-cli
    container_name: gw-renewer
    restart: unless-stopped
    networks:
      - gw_default
    depends_on:
      - certbot
      - nginx
    env_file: [.env]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./gw-data/letsencrypt:/etc/letsencrypt:ro
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        set -f

        CERT="/etc/letsencrypt/live/$$CERT_NAME/fullchain.pem"
        KEY="/etc/letsencrypt/live/$$CERT_NAME/privkey.pem"
        READY="/etc/letsencrypt/.gw-certbot-ready"

        hash_cert() {
          [ -f "$$CERT" ] && sha256sum "$$CERT" | awk '{print $$1}' || echo ""
        }

        echo "[renewer] wait for cert readiness (CERT+KEY+READY)..."
        while true; do
          if [ -f "$$CERT" ] && [ -f "$$KEY" ] && [ -f "$$READY" ]; then
            break
          fi
          sleep 2
        done

        docker restart gw-nginx

        echo "[renewer] start renew loop interval=$${RENEW_INTERVAL:-12h}"
        while true; do
          OLD="$$(hash_cert)"

          docker exec gw-certbot certbot renew --quiet || true

          NEW="$$(hash_cert)"
          if [ -n "$$NEW" ] && [ "$$NEW" != "$$OLD" ]; then
            echo "[renewer] cert changed -> reload nginx"
            docker exec gw-nginx nginx -s reload || docker restart gw-nginx
          else
            echo "[renewer] no change"
          fi

          sleep "$${RENEW_INTERVAL:-12h}"
        done
      
networks:
  gw_default:
    name: gw-stack_default
  tc-transit:
    external: true
    name: tc-transit