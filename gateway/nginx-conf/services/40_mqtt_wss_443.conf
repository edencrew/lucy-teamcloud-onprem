server {
  listen 443 ssl;
  server_name mqtt.dev.edencrew.io;

  include /etc/nginx/conf.d/20_tls_server.inc;

  location / {
    # WS/WSS용 공통 정책(업그레이드 헤더 + 1h 타임아웃 + buffering off)
    include /etc/nginx/conf.d/31_policy_http_ws_proxy.inc;

    set $upstream teamcloud-network-mqtt:9001;
    proxy_pass http://$upstream;
  }
}