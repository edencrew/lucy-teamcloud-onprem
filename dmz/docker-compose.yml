name: lucy-teamcloud-dmz

services:
  dmz-mqtt-proxy:
    image: nginx:1.26-alpine
    restart: unless-stopped
    ports:
      - "${DMZ_HTTP_PORT:-80}:80"
      - "${DMZ_HTTPS_PORT:-443}:443"
    environment:
      DMZ_SERVER_NAME: ${DMZ_SERVER_NAME}
      DMZ_PROXY_MODE: ${DMZ_PROXY_MODE:-mqtt}
      DMZ_ENABLE_TLS: ${DMZ_ENABLE_TLS:-1}
      DMZ_HTTPS_PORT: ${DMZ_HTTPS_PORT:-443}
      INTERNAL_MQTT_UPSTREAM: ${INTERNAL_MQTT_UPSTREAM:-}
      INTERNAL_TEAMCLOUD_UPSTREAM: ${INTERNAL_TEAMCLOUD_UPSTREAM:-}
      DMZ_TLS_CERTIFICATE: ${DMZ_TLS_CERTIFICATE:-/etc/nginx/certs/server.crt}
      DMZ_TLS_CERTIFICATE_KEY: ${DMZ_TLS_CERTIFICATE_KEY:-/etc/nginx/certs/server.key}
    volumes:
      - ./nginx:/etc/nginx/templates:ro
      - ./certs:/etc/nginx/certs:ro
    command:
      - /bin/sh
      - -ec
      - |
        server_name="$${DMZ_SERVER_NAME:-}"
        if [ -z "$$server_name" ]; then
          echo "DMZ_SERVER_NAME is required" >&2
          exit 1
        fi
        case "$$server_name" in
          *://*|*/*|*:*)
            echo "DMZ_SERVER_NAME must be a host or IP only, without scheme, path, or port: $$server_name" >&2
            exit 1
            ;;
        esac

        https_port="$${DMZ_HTTPS_PORT:-443}"
        case "$$https_port" in
          ""|*[!0-9]*)
            echo "DMZ_HTTPS_PORT must be a numeric TCP port: $$https_port" >&2
            exit 1
            ;;
        esac
        if [ "$$https_port" -lt 1 ] || [ "$$https_port" -gt 65535 ]; then
          echo "DMZ_HTTPS_PORT must be between 1 and 65535: $$https_port" >&2
          exit 1
        fi
        if [ "$$https_port" = "443" ]; then
          DMZ_HTTPS_REDIRECT_ORIGIN="https://$$server_name"
        else
          DMZ_HTTPS_REDIRECT_ORIGIN="https://$$server_name:$$https_port"
        fi

        mode="$${DMZ_PROXY_MODE:-mqtt}"
        case "$$mode" in
          mqtt|teamcloud)
            ;;
          *)
            echo "Unsupported DMZ_PROXY_MODE: $$mode" >&2
            exit 1
            ;;
        esac

        if [ "$$mode" = "teamcloud" ]; then
          if [ -z "$${INTERNAL_TEAMCLOUD_UPSTREAM:-}" ]; then
            INTERNAL_TEAMCLOUD_UPSTREAM="$${INTERNAL_MQTT_UPSTREAM:-}"
          fi
          if [ -z "$$INTERNAL_TEAMCLOUD_UPSTREAM" ]; then
            echo "INTERNAL_TEAMCLOUD_UPSTREAM is required in teamcloud mode" >&2
            exit 1
          fi
          if [ "$${DMZ_ENABLE_TLS:-1}" = "0" ]; then
            template=/etc/nginx/templates/nginx.teamcloud.ws.conf.template
          else
            template=/etc/nginx/templates/nginx.teamcloud.wss.conf.template
          fi
        else
          if [ -z "$${INTERNAL_MQTT_UPSTREAM:-}" ]; then
            echo "INTERNAL_MQTT_UPSTREAM is required in mqtt mode" >&2
            exit 1
          fi
          if [ "$${DMZ_ENABLE_TLS:-1}" = "0" ]; then
            template=/etc/nginx/templates/nginx.ws.conf.template
          else
            template=/etc/nginx/templates/nginx.wss.conf.template
          fi
        fi

        export DMZ_PROXY_MODE INTERNAL_TEAMCLOUD_UPSTREAM DMZ_HTTPS_REDIRECT_ORIGIN
        envsubst '$$DMZ_SERVER_NAME $$DMZ_PROXY_MODE $$DMZ_HTTPS_REDIRECT_ORIGIN $$INTERNAL_MQTT_UPSTREAM $$INTERNAL_TEAMCLOUD_UPSTREAM $$DMZ_TLS_CERTIFICATE $$DMZ_TLS_CERTIFICATE_KEY' \
          < "$$template" \
          > /etc/nginx/nginx.conf
        nginx -t
        exec nginx -g 'daemon off;'
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
