events {
    worker_connections 1024;
}

http {
    upstream tc-fe {
        server tc-fe:80;
    }

    upstream tc-be {
        server tc-be:8080;
    }

    upstream auth-fe {
        server auth-fe:80;
    }

    upstream auth-be {
        server auth-be:8080;
    }

    upstream git {
        server git:80;
    }

    upstream broker-ws {
        server broker:8080;
    }

    # WebSocket upgrade 헤더 매핑 (Upgrade 요청이면 "upgrade", 아니면 "close")
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        listen [::]:80;
        listen 443 ssl;
        listen [::]:443 ssl;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # ALB health check
        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK";
        }

        # 로그아웃 form action url 조정
        location /api/v1/oidc/ {
            return 307 /auth$request_uri;
        }

        # /auth/api -> auth-be (경로가 더 구체적인 순으로 정의)
        location /auth/api/ {
            proxy_pass http://auth-be/api/;          # request path 는 /auth/ 제거
            proxy_cookie_path /api/ /auth/api/;      # 쿠키 path만 그데로 사용
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /auth -> auth-fe
        location /auth/ {
            proxy_pass http://auth-fe/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /git -> tc-be (Git HTTP Proxy)
        # tc-be의 GitProxyService가 인증/권한 검사 후 내부 Gitea로 프록시
        location /git/ {
            proxy_pass http://tc-be/git/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 250m;
        }

        # /gitea -> gitea (디버깅/고객지원용, 평소엔 비활성)
        # 원칙적으로 Git 서버는 외부에 직접 노출하지 않음. 위 /git/ 경유로만 접근.
        # 디버깅 등 필요한 경우에만 아래 블록의 주석을 해제하여 사용.
        # location /gitea/ {
        #     proxy_pass http://git/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # /mqtt -> broker (WSS/WS → broker WS 리버스 프록시, MQTT-over-WebSocket)
        # ^~ prefix 매치로 /mqtt, /mqtt/ 둘 다 수용 (location /mqtt/ 만 두면
        # trailing slash 없는 요청에 nginx 가 301 redirect 를 내려 WS handshake 가 실패).
        # proxy_pass 끝에 URI 를 두지 않아 원본 path 가 그대로 broker 에 전달됨.
        location ^~ /mqtt {
            proxy_pass http://broker-ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # MQTT keepalive 동안 유휴 연결이 끊기지 않도록 타임아웃 확대
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # /api -> tc-be
        location /api/ {
            proxy_pass http://tc-be/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # / -> tc-fe (기본)
        location / {
            proxy_pass http://tc-fe/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
