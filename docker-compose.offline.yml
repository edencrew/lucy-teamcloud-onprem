services:
  init-secrets:
    image: lucy-teamcloud-onprem-init-secrets:offline
    build:
      context: ./init-secrets
    platform: ${TARGET_PLATFORM:-linux/amd64}
    volumes: !override
      - ./secrets:/secrets
      - ./nginx/certs:/certs
    command: null

  broker:
    # Offline package/runtime image name for the locally built broker.
    # Keep docker-compose.yml unchanged for normal online/dev usage.
    image: lucy-teamcloud-onprem-broker:offline

    # Target platform for offline packaging/runtime.
    # Example override:
    #   TARGET_PLATFORM=linux/arm64 ./scripts/export-compose-images.sh
    platform: ${TARGET_PLATFORM:-linux/amd64}