services:
  gw:
    platform: ${TARGET_PLATFORM:-linux/amd64}
    ports: !override
      - "18080:80"
      - "18443:443"

  init-secrets:
    image: lucy-teamcloud-onprem-init-secrets:offline
    build:
      context: ./init-secrets
    platform: ${TARGET_PLATFORM:-linux/amd64}
    volumes: !override
      - ./secrets:/secrets
      - ./nginx/certs:/certs
    command: null

  broker:
    image: eclipse-mosquitto:2.0.22
    platform: ${TARGET_PLATFORM:-linux/amd64}

  git:
    platform: ${TARGET_PLATFORM:-linux/amd64}

  db:
    platform: ${TARGET_PLATFORM:-linux/amd64}

  auth-be:
    platform: ${TARGET_PLATFORM:-linux/amd64}

  auth-fe:
    platform: ${TARGET_PLATFORM:-linux/amd64}

  tc-be:
    platform: ${TARGET_PLATFORM:-linux/amd64}

  tc-fe:
    platform: ${TARGET_PLATFORM:-linux/amd64}
